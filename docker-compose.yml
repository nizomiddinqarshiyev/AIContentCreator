services:
  app:
    build: .
    container_name: ai-trend-creator
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/db_data/content_creator.db
      - DEBUG=True
    volumes:
      - .:/app
      - db_data:/app/db_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: ai_content_nginx
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    restart: always

volumes:
  db_data: